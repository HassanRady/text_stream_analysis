name: CI

on:
  pull_request:
  push:
    branches: [ main,Dev ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12.3"
  PIPENV_VENV_IN_PROJECT: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  quality:
    name: Quality (ruff, mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pipenv
        run: |
          python -m pip install --upgrade pip
          pip install pipenv

      - name: Cache Pipenv virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-pipenv-${{ hashFiles('Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-pipenv-

      - name: Install dependencies (locked)
        run: |
          # Requires Pipfile.lock committed to the repo
          pipenv sync --dev

      - name: Ruff format (check)
        run: |
          pipenv run ruff format --check .

      - name: Ruff lint
        run: |
          pipenv run ruff check .

      - name: Mypy
        run: |
          pipenv run mypy .

  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ quality ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pipenv
        run: |
          python -m pip install --upgrade pip
          pip install pipenv

      - name: Install dependencies (locked)
        run: |
          pipenv sync --dev

      - name: Run tests
        run: |
          pipenv run pytest -q

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ tests ]
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: fastapi-ci:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [ quality ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pipenv
        run: |
          python -m pip install --upgrade pip
          pip install pipenv

      - name: Install dependencies (locked)
        run: |
          pipenv sync --dev

      - name: Install pip-audit (pipx)
        run: |
          python -m pip install --upgrade pipx
          pipx ensurepath
          pipx install pip-audit

      - name: Dependency audit (pip-audit against Pipfile.lock)
        run: |
          pipx run pip-audit -r <(pipenv requirements)