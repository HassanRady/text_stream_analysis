name: CD - Deploy to AWS

on:
  push:
    branches:
      - main
      - master
      - staging
      - dev
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.7.0

jobs:
  determine-env:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      ecr_repository: ${{ steps.env.outputs.ecr_repository }}
      ecs_cluster: ${{ steps.env.outputs.ecs_cluster }}
      terraform_dir: ${{ steps.env.outputs.terraform_dir }}
      approval_required: ${{ steps.env.outputs.approval_required }}
    steps:
      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "ecr_repository=reddit-kafka-prod-app" >> $GITHUB_OUTPUT
            echo "ecs_cluster=reddit-kafka-prod" >> $GITHUB_OUTPUT
            echo "terraform_dir=envs/prod" >> $GITHUB_OUTPUT
            echo "approval_required=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "ecr_repository=reddit-kafka-staging-app" >> $GITHUB_OUTPUT
            echo "ecs_cluster=reddit-kafka-staging" >> $GITHUB_OUTPUT
            echo "terraform_dir=envs/staging" >> $GITHUB_OUTPUT
            echo "approval_required=false" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "ecr_repository=reddit-kafka-dev-app" >> $GITHUB_OUTPUT
            echo "ecs_cluster=reddit-kafka-dev" >> $GITHUB_OUTPUT
            echo "terraform_dir=envs/dev" >> $GITHUB_OUTPUT
            echo "approval_required=false" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: determine-env
    outputs:
      image_uri: ${{ steps.image-uri.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ needs.determine-env.outputs.ecr_repository }}" || \
            aws ecr create-repository --repository-name "${{ needs.determine-env.outputs.ecr_repository }}"

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ needs.determine-env.outputs.ecr_repository }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ needs.determine-env.outputs.ecr_repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image URI
        id: image-uri
        run: |
          echo "uri=${{ steps.login-ecr.outputs.registry }}/${{ needs.determine-env.outputs.ecr_repository }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  terraform-deploy:
    name: Terraform Apply (${{ needs.determine-env.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [determine-env, build-and-push]
    environment:
      name: ${{ needs.determine-env.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ${{ needs.determine-env.outputs.terraform_dir }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ needs.determine-env.outputs.terraform_dir }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ needs.determine-env.outputs.terraform_dir }}
        run: |
          terraform plan \
            -var="app_image_tag=${{ github.sha }}" \
            -var-file="${{ needs.determine-env.outputs.terraform_dir }}/terraform.tfvars" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ needs.determine-env.outputs.terraform_dir }}
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: tf-output
        working-directory: ${{ needs.determine-env.outputs.terraform_dir }}
        run: |
          echo "alb_dns=$(terraform output -raw alb_dns)" >> $GITHUB_OUTPUT
          echo "ecs_cluster=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "subnet_ids=$(terraform output -raw private_subnet_ids)" >> $GITHUB_OUTPUT
          echo "security_group_id=$(terraform output -raw ecs_security_group_id)" >> $GITHUB_OUTPUT
          echo "task_definition=$(terraform output -raw ecs_task_definition_arn)" >> $GITHUB_OUTPUT

      - name: Run Database Migrations
        id: migrations
        run: |
          # Extract subnet and security group from Terraform outputs
          SUBNETS=$(echo '${{ steps.tf-output.outputs.subnet_ids }}' | jq -c '.')
          SG=$(echo '${{ steps.tf-output.outputs.security_group_id }}')
          TASK_DEF=$(echo '${{ steps.tf-output.outputs.task_definition }}' | rev | cut -d':' -f1 | rev)

          # Extract cluster name for the run-task call
          CLUSTER="${{ needs.determine-env.outputs.ecs_cluster }}"

          RUN_OUT=$(aws ecs run-task \
          --cluster "$CLUSTER" \
          --task-definition "$TASK_DEF" \
          --launch-type FARGATE \
          --network-configuration "awsvpcConfiguration={subnets=$SUBNETS,securityGroups=[$SG],assignPublicIp=DISABLED}" \
          --overrides '{"containerOverrides":[{"name":"app","command":["python","-m","src.migrations"]}]}' \
          --region $AWS_REGION --output json)

          TASK_ARN=$(echo "$RUN_OUT" | jq -r '.tasks[0].taskArn // ""')

          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

      - name: Wait for Migrations to Complete
        run: |
          if [ -n "${{ steps.migrations.outputs.task_arn }}" ]; then
            aws ecs wait tasks-stopped \
              --cluster ${{ needs.determine-env.outputs.ecs_cluster }} \
              --tasks ${{ steps.migrations.outputs.task_arn }} \
              --region ${{ env.AWS_REGION }}
            
            # Check exit code
            EXIT_CODE=$(aws ecs describe-tasks \
              --cluster ${{ needs.determine-env.outputs.ecs_cluster }} \
              --tasks ${{ steps.migrations.outputs.task_arn }} \
              --query 'tasks[0].containers[0].exitCode' \
              --output text \
              --region ${{ env.AWS_REGION }})
            
            if [ "$EXIT_CODE" != "0" ]; then
              echo "❌ Migrations failed with exit code: $EXIT_CODE"
              exit 1
            fi
            echo "✅ Migrations completed successfully"
          fi
        timeout-minutes: 10

      - name: Wait for Service Stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ needs.determine-env.outputs.ecs_cluster }} \
            --services reddit-kafka-${{ needs.determine-env.outputs.environment }}-app \
            --region ${{ env.AWS_REGION }}
        timeout-minutes: 10

      - name: Health Check
        run: |
          ALB_DNS="${{ steps.tf-output.outputs.alb_dns }}"
          echo "🔍 Checking health endpoint: http://$ALB_DNS/health"

          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_DNS/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed ($HTTP_CODE)"
              exit 0
            fi
            echo "⏳ Attempt $i/30: HTTP $HTTP_CODE, retrying..."
            sleep 10
          done

          echo "❌ Health check failed after 5 minutes"
          exit 1

      - name: Deployment Summary
        if: success()
        run: |
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ needs.determine-env.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | ${{ needs.build-and-push.outputs.image_uri }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **ALB DNS** | ${{ steps.tf-output.outputs.alb_dns }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Cluster** | ${{ steps.tf-output.outputs.ecs_cluster }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Git SHA** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

      - name: Deployment Failed
        if: failure()
        run: |
          echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Environment: ${{ needs.determine-env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "Check logs above for details." >> $GITHUB_STEP_SUMMARY
